<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG 文档问答系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        :root{--primary:#2563eb;--bg-white:#fff;--bg-light:#fafafa;--bg-gray:#f5f5f5;--text-main:#111827;--text-secondary:#4b5563;--text-muted:#9ca3af;--border:#e5e7eb;--shadow:0 1px 3px rgba(0,0,0,.1);--shadow-lg:0 10px 15px rgba(0,0,0,.1);--transition:all .2s cubic-bezier(.4,0,.2,1)}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:var(--bg-light);color:var(--text-main);min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
        .header{background:var(--bg-white);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;position:sticky;top:0;z-index:100}
        .header-title{font-size:15px;font-weight:600}
        .main{flex:1;display:flex;flex-direction:column;max-width:900px;margin:0 auto;width:100%;padding:24px;gap:20px}
        .upload-section{background:var(--bg-white);border:1px solid var(--border);border-radius:16px;padding:24px}
        .upload-title{font-size:16px;font-weight:600;margin-bottom:12px}
        .upload-area{border:2px dashed var(--border);border-radius:12px;padding:32px;text-align:center;cursor:pointer;transition:var(--transition)}
        .upload-area:hover{border-color:var(--primary);background:var(--bg-light)}
        .upload-icon{font-size:36px;color:var(--text-muted);margin-bottom:12px}
        .upload-text{font-size:14px;color:var(--text-secondary);margin-bottom:4px}
        .upload-hint{font-size:12px;color:var(--text-muted)}
        .upload-input{display:none}
        .chat-section{flex:1;display:flex;flex-direction:column;background:var(--bg-white);border:1px solid var(--border);border-radius:16px;overflow:hidden}
        .chat-header{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
        .chat-title{font-size:14px;font-weight:600}
        .chat-container{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px;min-height:350px}
        .message{display:flex;gap:10px;max-width:85%;animation:fadeIn .3s ease-out}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        .message.user{align-self:flex-end;flex-direction:row-reverse}
        .message.assistant{align-self:flex-start}
        .msg-avatar{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
        .message.user .msg-avatar{background:var(--primary);color:#fff}
        .message.assistant .msg-avatar{background:var(--bg-gray);border:1px solid var(--border)}
        .msg-content{padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.6;white-space:pre-wrap}
        .message.user .msg-content{background:var(--text-main);color:#fff;border-bottom-right-radius:4px}
        .message.assistant .msg-content{background:var(--bg-white);border:1px solid var(--border);border-bottom-left-radius:4px}
        .sources{margin-top:6px;padding:8px 10px;background:var(--bg-gray);border-radius:8px;font-size:11px;color:var(--text-muted)}
        .sources-title{font-weight:600;margin-bottom:3px;color:var(--text-secondary)}
        .loading{display:none;align-self:flex-start;padding:10px 14px;background:var(--bg-white);border:1px solid var(--border);border-radius:12px;border-bottom-left-radius:4px;font-size:13px;color:var(--text-muted)}
        .loading.show{display:flex;align-items:center;gap:8px}
        .dots{display:flex;gap:4px}
        .dots span{width:5px;height:5px;background:var(--text-muted);border-radius:50%;animation:bounce 1.4s infinite ease-in-out}
        .dots span:nth-child(1){animation-delay:-.32s}
        .dots span:nth-child(2){animation-delay:-.16s}
        @keyframes bounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
        .input-area{background:var(--bg-white);border-top:1px solid var(--border);padding:14px 20px}
        .input-wrapper{display:flex;gap:10px}
        .input-wrapper input{flex:1;padding:10px 14px;background:var(--bg-gray);border:1px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;color:var(--text-main);outline:none;transition:var(--transition)}
        .input-wrapper input:focus{background:var(--bg-white);border-color:var(--primary)}
        .send-btn{padding:10px 18px;background:var(--text-main);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;transition:var(--transition);display:flex;align-items:center;gap:6px}
        .send-btn:hover{background:var(--text-secondary);transform:translateY(-1px);box-shadow:var(--shadow-lg)}
        .send-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .welcome{text-align:center;padding:40px 20px;color:var(--text-muted)}
        .welcome-icon{font-size:40px;margin-bottom:12px}
        .welcome-title{font-size:16px;font-weight:600;color:var(--text-main);margin-bottom:6px}
        .welcome-desc{font-size:13px;max-width:350px;margin:0 auto}
        .header-btn{padding:6px 12px;background:var(--bg-gray);border:1px solid var(--border);border-radius:8px;color:var(--text-secondary);font-size:12px;font-weight:500;cursor:pointer;transition:var(--transition)}
        .header-btn:hover{background:var(--bg-white);border-color:var(--text-muted);color:var(--text-main)}
        @media(max-width:640px){.header{padding:0 16px}.main{padding:16px}.chat-container{min-height:250px}.message{max-width:95%}}
    </style>
</head>
<body>
    <header class="header">
        <span class="header-title">📚 RAG 文档问答系统</span>
        <button class="header-btn" onclick="clearChat()">清空</button>
    </header>

    <div class="main">
        <div class="upload-section">
            <div class="upload-title">📄 上传文档</div>
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                <div class="upload-icon"><i class="fas fa-cloud-upload-alt"></i></div>
                <div class="upload-text">点击上传文档</div>
                <div class="upload-hint">支持 TXT、PDF、DOCX</div>
                <input type="file" id="fileInput" class="upload-input" accept=".txt,.pdf,.docx" onchange="uploadFile(this)">
            </div>
        </div>

        <div class="chat-section">
            <div class="chat-header">
                <span class="chat-title">💬 对话</span>
            </div>
            <div class="chat-container" id="chatContainer">
                <div class="welcome">
                    <div class="welcome-icon">📚</div>
                    <div class="welcome-title">RAG 文档问答</div>
                    <div class="welcome-desc">上传文档后，用自然语言提问</div>
                </div>
            </div>
            <div class="loading" id="loading">
                <div class="dots"><span></span><span></span><span></span></div>
                思考中...
            </div>
            <div class="input-area">
                <div class="input-wrapper">
                    <input type="text" id="userInput" placeholder="输入问题..." onkeypress="if(event.key==='Enter')sendMessage()">
                    <button class="send-btn" onclick="sendMessage()" id="sendBtn">发送 <i class="fas fa-arrow-up"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:8000';

        async function uploadFile(input) {
            const file = input.files[0];
            if (!file) return;
            const fd = new FormData();
            fd.append('file', file);
            try {
                const r = await fetch(`${API}/upload/`, { method: 'POST', body: fd });
                const d = await r.json();
                alert(r.ok ? `✅ 上传成功！分块：${d.chunks}` : `❌ ${d.detail}`);
            } catch (e) { alert(`❌ ${e.message}`); }
            input.value = '';
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const msg = input.value.trim();
            if (!msg) return;
            document.querySelector('.welcome')?.remove();
            appendMsg('user', msg);
            input.value = '';
            const loading = document.getElementById('loading');
            const btn = document.getElementById('sendBtn');
            loading.classList.add('show');
            btn.disabled = true;
            try {
                const r = await fetch(`${API}/chat/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg, collection_name: 'default' })
                });
                const d = await r.json();
                appendMsg('assistant', r.ok ? d.reply : `❌ ${d.detail}`, d.sources);
            } catch (e) { appendMsg('assistant', `❌ ${e.message}`); }
            finally { loading.classList.remove('show'); btn.disabled = false; }
        }

        function clearChat() {
            document.getElementById('chatContainer').innerHTML = '';
        }

        function appendMsg(role, content, sources = []) {
            const c = document.getElementById('chatContainer');
            const d = document.createElement('div');
            d.className = `message ${role}`;
            let src = '';
            if (sources?.length) {
                src = `<div class="sources"><div class="sources-title">📚 来源：</div>${sources.map((s,i) => `${i+1}. ${s.content.substring(0,80)}...`).join('<br>')}</div>`;
            }
            d.innerHTML = `<div class="msg-avatar">${role === 'user' ? '👤' : '🤖'}</div><div class="msg-content">${esc(content)}${src}</div>`;
            c.appendChild(d);
            c.scrollTop = c.scrollHeight;
        }

        function esc(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
    </script>
</body>
</html>
