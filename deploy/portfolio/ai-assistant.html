<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能问答助手</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

        :root {
            --primary: #2563eb;
            --primary-light: #3b82f6;
            --primary-dark: #1d4ed8;
            --accent: #0ea5e9;
            --success: #10b981;
            --warning: #f59e0b;
            --bg-white: #ffffff;
            --bg-light: #fafafa;
            --bg-gray: #f5f5f5;
            --text-main: #111827;
            --text-secondary: #4b5563;
            --text-muted: #9ca3af;
            --border: #e5e7eb;
            --border-light: #f3f4f6;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px -1px rgba(0, 0, 0, 0.1);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-light);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        /* Header */
        .header {
            background: var(--bg-white);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: var(--bg-gray);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: var(--transition);
        }

        .back-btn:hover {
            background: var(--bg-white);
            border-color: var(--text-muted);
            color: var(--text-main);
        }

        .header-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-main);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            background: var(--bg-gray);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }

        .header-btn:hover {
            background: var(--bg-white);
            border-color: var(--text-muted);
            color: var(--text-main);
        }

        /* Chat Container */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            gap: 12px;
            max-width: 80%;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message.assistant {
            align-self: flex-start;
        }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background: var(--primary);
            color: white;
        }

        .message.assistant .message-avatar {
            background: var(--bg-gray);
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }

        .message-content {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .message.user .message-content {
            background: var(--text-main);
            color: var(--bg-white);
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-content {
            background: var(--bg-white);
            color: var(--text-main);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        /* Loading */
        .loading {
            display: none;
            align-self: flex-start;
            padding: 12px 16px;
            background: var(--bg-white);
            border: 1px solid var(--border);
            border-radius: 12px;
            border-bottom-left-radius: 4px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .loading.show {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .loading-dots {
            display: flex;
            gap: 4px;
        }

        .loading-dots span {
            width: 6px;
            height: 6px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loading-dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% {
                transform: scale(0);
            }
            40% {
                transform: scale(1);
            }
        }

        /* Input Area */
        .input-area {
            background: var(--bg-white);
            border-top: 1px solid var(--border);
            padding: 16px 24px;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            max-width: 800px;
            margin: 0 auto;
        }

        .input-wrapper input {
            flex: 1;
            padding: 12px 16px;
            background: var(--bg-gray);
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            color: var(--text-main);
            outline: none;
            transition: var(--transition);
        }

        .input-wrapper input:focus {
            background: var(--bg-white);
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .input-wrapper input::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            padding: 12px 20px;
            background: var(--text-main);
            color: var(--bg-white);
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .send-btn:hover {
            background: var(--text-secondary);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Welcome Message */
        .welcome {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        .welcome-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .welcome-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .welcome-desc {
            font-size: 14px;
            max-width: 400px;
            margin: 0 auto;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .header {
                padding: 0 16px;
            }

            .chat-container {
                padding: 16px;
            }

            .message {
                max-width: 90%;
            }

            .input-area {
                padding: 12px 16px;
            }

            .header-title {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <a href="index.html" class="back-btn">
                <i class="fas fa-arrow-left"></i>
                返回
            </a>
            <span class="header-title">AI 智能问答助手</span>
        </div>
        <div class="header-right">
            <button class="header-btn" onclick="loadHistory()">
                <i class="fas fa-clock-rotate-left"></i>
                历史
            </button>
            <button class="header-btn" onclick="clearHistory()">
                <i class="fas fa-trash-can"></i>
                清空
            </button>
        </div>
    </header>

    <!-- Chat Container -->
    <div class="chat-container" id="chatContainer">
        <div class="welcome">
            <div class="welcome-icon">🤖</div>
            <div class="welcome-title">AI 智能问答助手</div>
            <div class="welcome-desc">基于 DeepSeek 大模型，有什么问题尽管问我</div>
        </div>
    </div>

    <!-- Loading -->
    <div class="loading" id="loading">
        <div class="loading-dots">
            <span></span>
            <span></span>
            <span></span>
        </div>
        思考中...
    </div>

    <!-- Input Area -->
    <div class="input-area">
        <div class="input-wrapper">
            <input
                type="text"
                id="userInput"
                placeholder="输入你的问题..."
                onkeypress="if(event.key==='Enter') sendMessage()"
                autofocus
            >
            <button class="send-btn" onclick="sendMessage()" id="sendBtn">
                发送
                <i class="fas fa-arrow-up"></i>
            </button>
        </div>
    </div>

    <script>
        // API 基础地址
        const API_BASE = 'https://cg-work-d3geug43lc211422a-1307660528.ap-shanghai.app.tcloudbase.com';

        // 发送消息
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();

            if (!message) return;

            // 移除欢迎消息
            const welcome = document.querySelector('.welcome');
            if (welcome) welcome.remove();

            // 显示用户消息
            appendMessage('user', message);
            input.value = '';

            // 显示加载状态
            const loading = document.getElementById('loading');
            const sendBtn = document.getElementById('sendBtn');
            loading.classList.add('show');
            sendBtn.disabled = true;

            try {
                const response = await fetch(`${API_BASE}/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: message,
                        collection_name: 'default'
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    appendMessage('assistant', data.reply);
                } else {
                    appendMessage('assistant', `❌ 错误：${data.error}`);
                }

            } catch (error) {
                console.error('调用云函数失败：', error);
                appendMessage('assistant', `❌ 网络错误：${error.message}`);
            } finally {
                loading.classList.remove('show');
                sendBtn.disabled = false;
            }
        }

        // 加载历史消息
        async function loadHistory() {
            try {
                const response = await fetch(`${API_BASE}/history?limit=50`);
                const data = await response.json();

                if (response.ok) {
                    const chatContainer = document.getElementById('chatContainer');
                    chatContainer.innerHTML = '';

                    if (data.messages && data.messages.length > 0) {
                        data.messages.forEach(msg => {
                            appendMessage(msg.role, msg.content);
                        });
                    } else {
                        appendMessage('assistant', '暂无历史消息');
                    }
                }

            } catch (error) {
                console.error('加载历史失败：', error);
                appendMessage('assistant', `❌ 加载历史失败：${error.message}`);
            }
        }

        // 清空历史消息
        async function clearHistory() {
            if (!confirm('确定要清空所有历史消息吗？')) {
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/clear`, {
                    method: 'POST'
                });

                const data = await response.json();

                if (response.ok) {
                    const chatContainer = document.getElementById('chatContainer');
                    chatContainer.innerHTML = '';
                    appendMessage('assistant', '历史已清空');
                }

            } catch (error) {
                console.error('清空历史失败：', error);
                appendMessage('assistant', `❌ 清空历史失败：${error.message}`);
            }
        }

        // 添加消息到聊天区域
        function appendMessage(role, content) {
            const chatContainer = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            messageDiv.innerHTML = `
                <div class="message-avatar">${role === 'user' ? '👤' : '🤖'}</div>
                <div class="message-content">${escapeHtml(content)}</div>
            `;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // HTML 转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
